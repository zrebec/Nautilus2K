<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZX-Nautilus Minesweeper</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      color: #888;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    canvas#game {
      width: min(100vw, calc(100dvh * 4 / 3));
      /* ← toto škáluje displej na celú obrazovku */
      height: auto;
      aspect-ratio: 4 / 3;
      image-rendering: pixelated;
      /* upscale ostane ostrý, nie rozmazaný */
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
